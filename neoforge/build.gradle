plugins {
    id 'multiloader-loader'
    id 'net.neoforged.moddev'
}

neoForge {
    version = neoforge_version

    def at = project(':common').file('src/main/resources/META-INF/accesstransformer.cfg')
    accessTransformers.from(at.absolutePath)

    validateAccessTransformers = true

    runs {
        configureEach {
            systemProperty('neoforge.enabledGameTestNamespaces', mod_id)
            ideName = "NeoForge ${it.name.capitalize()} (${project.path})" // Unify the run config names with fabric
        }
        client {
            client()
            gameDirectory = this.mkdir(this.file("runs/client"))
        }
        data {
            clientData()
            gameDirectory = this.mkdir(this.file("runs/data"))
            // DataGen can be run by - "./gradlew :neoforge:runData" in Terminal.
            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }
    }

    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

dependencies {
    jarJar(implementation("org.commonmark:commonmark:${commonmark_version}"))

    if (rootProject.file('../ModernUI').exists()) {
        implementation(forgeRuntimeLibrary("icyllis.arc3d:Arc3D"))
        shadow("icyllis.arc3d:Arc3D") {
            transitive = false
        }
        implementation(forgeRuntimeLibrary("icyllis.modernui:ModernUI-Core"))
        shadow("icyllis.modernui:ModernUI-Core") {
            transitive = false
        }
        implementation(forgeRuntimeLibrary("icyllis.modernui:ModernUI-Markflow"))
        shadow("icyllis.modernui:ModernUI-Markflow") {
            transitive = false
        }
    } else {
        implementation("icyllis.modernui:ModernUI-Core:${core_version}")
        jarJar(implementation("icyllis.modernui:ModernUI-Core:${core_version}")) {
            transitive = false
        }
        implementation("icyllis.modernui:ModernUI-Markflow:${core_version}")
        jarJar(implementation("icyllis.modernui:ModernUI-Markflow:${core_version}")) {
            transitive = false
        }
    }

    //implementation(forgeDependencies("com.vladsch.flexmark:flexmark:${flexmark_version}"))

    //modRuntimeOnly("mekanism:Mekanism:1.21.1-10.7.7.64")

    /*include "com.vladsch.flexmark:flexmark:${flexmark_version}"
    include "com.vladsch.flexmark:flexmark-util-ast:${flexmark_version}"
    include "com.vladsch.flexmark:flexmark-util-builder:${flexmark_version}"
