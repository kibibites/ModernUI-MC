modLoader="javafml"
loaderVersion="${neoforge_loader_version_range}"
issueTrackerURL="${issues_url}"
logoFile= "modernui_logo.png"
license="${license}"

[[mods]]
    modId="${mod_id}"
    version="${version}"
    displayName="${mod_name}"
    displayURL="${mod_homepage}"
    authors="${mod_author}"
    description='''${description}'''

[[mixins]]
    config="mixins.modernui-neoforge.json"

[[mixins]]
    config="mixins.modernui-textmc.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neoforge_version},)"
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
[[dependencies.modernui]]
    modId="tipthescales"
    type="discouraged"
[[dependencies.modernui]]
    modId="blur"
    type="discouraged"